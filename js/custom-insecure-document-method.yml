rules:
  - id: custom-insecure-document-method
    message: User controlled data in methods like `innerHTML`, `outerHTML`, or `document.write` is an anti-pattern that can lead to XSS vulnerabilities
    metadata:
      cwe: "CWE-79: Improper Neutralization of Input During Web Page Generation ('Cross-site Scripting')"
      owasp: "A07:2017 - Cross-Site Scripting (XSS)"
      category: security
      technology:
        - browser
      cwe2022-top25: true
      cwe2021-top25: true
      subcategory:
        - audit
    languages: [javascript, typescript]
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              $EL.innerHTML = $HTML;
          - pattern: |
              $EL.outerHTML = $HTML;
          - pattern: document.write(...)
      - pattern-not: |
          $EL.innerHTML = "...";
      - pattern-not: |
          $EL.outerHTML = "...";
      - pattern-not: document.write("...")
      - pattern-not: $ELEMENT.innerHTML = DOMPurify.sanitize($DATA)
      - pattern-not: $ELEMENT.innerHTML = sanitize($DATA)
      - pattern-not-inside: |
          import DOMPurify from 'dompurify'
          ...
      - pattern-not-inside: |
          import {sanitize} from 'dompurify'
          ...